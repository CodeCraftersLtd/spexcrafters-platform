name: ci-web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["apps/web/**", "packages/**", "pnpm-workspace.yaml", "package.json", ".github/workflows/ci-web.yml"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (deterministic)
        run: pnpm install --frozen-lockfile

      - name: Design tokens — build outputs are current
        run: pnpm tokens:check

      - name: Lint
        run: pnpm -r lint

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Unit tests
        run: pnpm -r test

      - name: Validate locale message resources (Tier-3, all 20 locales)
        run: node apps/web/scripts/validate-locales.mjs

      - name: Build web
        run: pnpm --filter @spexcrafters/web build
        env:
          SESSION_SECRET: Y2ktYnVpbGQtb25seS1ub3QtYS1yZWFsLXNlY3JldC0hIQ==
          API_BASE_URL: http://localhost:8080/api/v1
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
