name: ci-api

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]
  pull_request:
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]

permissions:
  contents: read

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # `verify` runs unit tests, Testcontainers-backed integration tests
      # (Docker is available on ubuntu-latest), and the ArchUnit module suite.
      # Wrapper-pinned Maven (3.9.9) — never a runner-provided version.
      - name: Build and verify
        run: ./mvnw -B verify
        working-directory: apps/api

      # -am builds sibling reactor modules (verify does not install them to
      # ~/.m2); failIfNoSpecifiedTests lets those siblings run zero matches.
      - name: Validate Flyway migrations from empty schema
        run: ./mvnw -B -pl application -am test -Dtest=*MigrationTest* -Dsurefire.failIfNoSpecifiedTests=false
        working-directory: apps/api
