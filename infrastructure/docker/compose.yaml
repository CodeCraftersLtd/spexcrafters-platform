name: spexcrafters

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: spexcrafters
      POSTGRES_USER: spexcrafters
      POSTGRES_PASSWORD: spexcrafters_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spexcrafters -d spexcrafters"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: spexcrafters
      MINIO_ROOT_PASSWORD: spexcrafters_dev
      # Allow the browser's direct-to-storage evidence PUT (ADR-023). Dev/CI only —
      # production storage sets an explicit per-origin CORS policy on the bucket.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 spexcrafters spexcrafters_dev &&
      mc mb --ignore-existing local/spexcrafters-media &&
      mc mb --ignore-existing local/spexcrafters-evidence &&
      exit 0"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI + API (used by the Playwright smoke test)
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["observability"]
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

volumes:
  postgres-data:
  minio-data:
