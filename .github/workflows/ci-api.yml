name: ci-api

on:
  push:
    branches: [main]
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]
  pull_request:
    paths: ["apps/api/**", ".github/workflows/ci-api.yml"]

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      # `verify` runs unit tests, Testcontainers-backed integration tests
      # (Docker is available on ubuntu-latest), and the ArchUnit module suite.
      - name: Build and verify
        run: mvn -f apps/api/pom.xml -B verify

      - name: Validate Flyway migrations from empty schema
        run: mvn -f apps/api/pom.xml -B -pl application test -Dtest=*MigrationTest* -DfailIfNoTests=false
